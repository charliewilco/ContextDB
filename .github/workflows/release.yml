name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            archive: tar.gz

          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64
            archive: tar.gz
            cross: true

          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-x86_64
            archive: tar.gz

          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-aarch64
            archive: tar.gz

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --locked --release --target ${{ matrix.target }} --bin contextdb --features cli

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --locked --release --target ${{ matrix.target }} --bin contextdb --features cli

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../contextdb-${{ steps.version.outputs.version }}-${{ matrix.name }}.tar.gz contextdb
          cd ../../..
          shasum -a 256 contextdb-${{ steps.version.outputs.version }}-${{ matrix.name }}.tar.gz > contextdb-${{ steps.version.outputs.version }}-${{ matrix.name }}.tar.gz.sha256

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path contextdb.exe -DestinationPath ../../../contextdb-${{ steps.version.outputs.version }}-${{ matrix.name }}.zip
          cd ../../..
          (Get-FileHash contextdb-${{ steps.version.outputs.version }}-${{ matrix.name }}.zip -Algorithm SHA256).Hash.ToLower() + "  contextdb-${{ steps.version.outputs.version }}-${{ matrix.name }}.zip" | Out-File -Encoding utf8 contextdb-${{ steps.version.outputs.version }}-${{ matrix.name }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: contextdb-${{ matrix.name }}
          path: |
            contextdb-${{ steps.version.outputs.version }}-${{ matrix.name }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
